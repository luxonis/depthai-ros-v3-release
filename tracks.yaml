release_repo_url: git@github.com:luxonis/depthai-ros-v3-release.git
tracks:
  humble:
    actions:
    - bloom-export-upstream :{vcs_local_uri} :{vcs_type} --tag :{release_tag} --display-uri
      :{vcs_uri} --name :{name} --output-dir :{archive_dir_path}
    - git-bloom-import-upstream :{archive_path} :{patches} --release-version :{version}
      --replace
    - git-bloom-generate -y rosrelease :{ros_distro} --source upstream -i :{release_inc}
    - git-bloom-generate -y rosdebian --prefix release/:{ros_distro} :{ros_distro}
      -i :{release_inc} --os-name ubuntu
    - git-bloom-generate -y rosdebian --prefix release/:{ros_distro} :{ros_distro}
      -i :{release_inc} --os-name debian --os-not-required
    - git-bloom-generate -y rosrpm --prefix release/:{ros_distro} :{ros_distro} -i
      :{release_inc} --os-name fedora
    - git-bloom-generate -y rosrpm --prefix release/:{ros_distro} :{ros_distro} -i
      :{release_inc} --os-name rhel
    - git-bloom-generate -y rosdynrpm --prefix release/:{ros_distro} :{ros_distro}
      -i :{release_inc} --require-os fedora rhel
    devel_branch: v3_humble
    last_release: v3.1.1-humble.3
    last_version: 3.1.1
    name: upstream
    patches: null
    release_inc: '1'
    release_repo_url: git@github.com:luxonis/depthai-ros-v3-release.git
    release_tag: :{ask}
    ros_distro: humble
    vcs_type: git
    vcs_uri: https://github.com/luxonis/depthai-ros.git
    version: :{auto}
  jazzy:
    actions:
    - bloom-export-upstream :{vcs_local_uri} :{vcs_type} --tag :{release_tag} --display-uri
      :{vcs_uri} --name :{name} --output-dir :{archive_dir_path}
    - git-bloom-import-upstream :{archive_path} :{patches} --release-version :{version}
      --replace
    - git-bloom-generate -y rosrelease :{ros_distro} --source upstream -i :{release_inc}
    - git-bloom-generate -y rosdebian --prefix release/:{ros_distro} :{ros_distro}
      -i :{release_inc} --os-name ubuntu
    - git-bloom-generate -y rosdebian --prefix release/:{ros_distro} :{ros_distro}
      -i :{release_inc} --os-name debian --os-not-required
    - git-bloom-generate -y rosrpm --prefix release/:{ros_distro} :{ros_distro} -i
      :{release_inc} --os-name fedora
    - git-bloom-generate -y rosrpm --prefix release/:{ros_distro} :{ros_distro} -i
      :{release_inc} --os-name rhel
    - git-bloom-generate -y rosdynrpm --prefix release/:{ros_distro} :{ros_distro}
      -i :{release_inc} --require-os fedora rhel
    devel_branch: v3_jazzy
    last_release: v3.2.1-jazzy
    last_version: 3.2.1
    name: upstream
    patches: null
    release_inc: '1'
    release_repo_url: git@github.com:luxonis/depthai-ros-v3-release.git
    release_tag: :{ask}
    ros_distro: jazzy
    vcs_type: git
    vcs_uri: https://github.com/luxonis/depthai-ros.git
    version: :{auto}
